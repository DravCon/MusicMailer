name: Music Daily Newsletter

on:
  schedule:
    - cron: "0 8 * * *"   # 8:00 AM UTC every day
  workflow_dispatch:        # allow manual runs from GitHub UI

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Music Mailer
        env:
          BEDROCK_API_KEY:    ${{ secrets.BEDROCK_API_KEY }}
          BEDROCK_REGION:     ${{ secrets.BEDROCK_REGION }}
          BEDROCK_MODEL:      ${{ secrets.BEDROCK_MODEL }}
          SMTP_HOST:             ${{ secrets.SMTP_HOST }}
          SMTP_PORT:             ${{ secrets.SMTP_PORT }}
          SMTP_USER:             ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:         ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL:       ${{ secrets.RECIPIENT_EMAIL }}
          SENDER_NAME:           ${{ secrets.SENDER_NAME }}
        run: python music_mailer.py
